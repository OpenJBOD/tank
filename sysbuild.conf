# Build MCUboot as the bootloader (sysbuild) with A/B swap-using-move, matching
# the geometry proven in Phase 0 (dfutest). The signing key defaults to MCUboot's
# bundled dev key (bootloader/mcuboot/root-rsa-2048.pem); set
# SB_CONFIG_BOOT_SIGNATURE_KEY_FILE to a project key before production.
SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_MCUBOOT_MODE_SWAP_USING_MOVE=y
