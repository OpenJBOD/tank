# OpenJBOD board configuration for the MCUboot (firmware-upgrade) build.
# Mirrors boards/rpi_pico.conf - the rpi_pico/rp2040/mcuboot board needs the same
# W5500 Ethernet / SPI / I2C support as the plain rpi_pico board.

# Enable networking and Ethernet
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y

# Enable SPI for W5500 communication
CONFIG_SPI=y

# Enable W5500 Ethernet driver
CONFIG_ETH_W5500=y

# GPIO support for W5500 reset and interrupt pins
CONFIG_GPIO=y

# I2C support for EEPROM (MAC address)
CONFIG_I2C=y

# Enable HTTP service for the sample
CONFIG_NET_HTTP_SERVICE=y
CONFIG_NET_HTTP_SERVER_SERVICE_PORT=80
