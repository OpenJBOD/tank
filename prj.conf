# Hardware Drivers
CONFIG_GPIO=y
CONFIG_LED=y
CONFIG_I2C=y
CONFIG_EEPROM=y
CONFIG_SENSOR=y
CONFIG_W1=y
CONFIG_ADC=y
CONFIG_HWINFO=y

# Storage and Filesystem
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
# Use the OpenJBOD out-of-tree RP2040 flash driver (sub-page write fix); the
# in-tree driver silently drops sub-page writes on the W25Q128. See
# drivers/flash/flash_rpi_pico_fixed.c.
CONFIG_FLASH_RPI_PICO=n
CONFIG_FLASH_RPI_PICO_FIXED=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_DRIVER_FLASH=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_FSTAB_AUTOMOUNT=y
CONFIG_FS_FATFS_LFN=y

CONFIG_FS_FATFS_MAX_LFN=64

# Settings Subsystem
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_SETTINGS_FILE=y

CONFIG_SETTINGS_FILE_PATH="/settings/settings.dat"

# Platform Services
CONFIG_EVENTFD=y
CONFIG_REBOOT=y

# MCUboot firmware upgrade (DFU): stream an image into slot1, mark it pending,
# and confirm it on a healthy boot. Built via sysbuild (sysbuild.conf) for the
# rpi_pico/rp2040/mcuboot board. See src/firmware_update.c + POST /api/firmware.
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y

# USB CDC-ACM console (secondary shell over USB, alongside the hardware UART).
# Uses the device-next USB stack, matching the rpi_pico `raspberrypi,pico-usbd`
# controller. Compiled in via CONFIG_OPENJBOD_USB_CONSOLE (see Kconfig).
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_UART_LINE_CTRL=y
# Keep the USB stack quiet: usbd_cdc_acm/usbd_ch9 log per-transfer at INF, which
# with the USB shell acting as a log backend creates a runaway log->TX->log storm.
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_WRN=y
# USB device identity (consumed by samples/.../Kconfig.sample_usbd, already sourced).
CONFIG_SAMPLE_USBD_MANUFACTURER="OpenJBOD"
CONFIG_SAMPLE_USBD_PRODUCT="OpenJBOD Tank Console"
CONFIG_SAMPLE_USBD_PID=0x0004

# Core Kernel Configuration
CONFIG_SHELL=y
CONFIG_LOG=y
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_STACK_SENTINEL=y
CONFIG_POSIX_API=y
CONFIG_FDTABLE=y

CONFIG_ZVFS_OPEN_MAX=32
CONFIG_ZVFS_POLL_MAX=32
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_LOG_BUFFER_SIZE=4096

# Networking Stack
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_SHELL=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_USER_API=y
CONFIG_NET_LOG=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_CONTEXT_NET_PKT_POOL=y
CONFIG_NET_SOCKETS_LOG_LEVEL_WRN=y
CONFIG_NET_HTTP_LOG_LEVEL_INF=y
CONFIG_NET_IPV6_LOG_LEVEL_WRN=y
CONFIG_NET_IPV6_ND_LOG_LEVEL_WRN=y
CONFIG_NET_TCP_LOG_LEVEL_WRN=y
CONFIG_NET_IPV4_LOG_LEVEL_INF=y
CONFIG_NET_CORE_LOG_LEVEL_WRN=y
CONFIG_NET_PKT_LOG_LEVEL_WRN=y
CONFIG_NET_IF_LOG_LEVEL_INF=y
CONFIG_NET_DHCPV6=y

CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
# Keep 64 net bufs: 4 concurrent TLS handshakes can hold most of the pool, so cutting
# this starves the buffers and deadlocks the net stack under a parallel-connection
# burst (observed hang at 32).
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=2
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=2
# CONFIG_NET_MAX_CONTEXTS sizes the per-context slab AND the TCP conn slab
# (sizeof(struct tcp) x N ~= 21KB at 32). 32->16 is the largest single RAM saving;
# the device needs ~14 (http/https listeners + <=8 clients + DHCP/DNS/mDNS) and
# excess connections are refused gracefully. NET_TCP_TIME_WAIT_DELAY=0 frees them fast.
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_NET_MAX_CONN=16
CONFIG_NET_TCP_TIME_WAIT_DELAY=0
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=65535
CONFIG_NET_TCP_RECV_QUEUE_TIMEOUT=100

# Web Server and APIs
CONFIG_HTTP_PARSER_URL=y
CONFIG_HTTP_PARSER=y
CONFIG_HTTP_SERVER=y
CONFIG_NET_HTTP_SERVICE=y
CONFIG_NET_HTTPS_SERVICE=y
CONFIG_HTTP_SERVER_CAPTURE_HEADERS=y
# Capture Authorization + Content-Type + Cookie, with room for a session-cookie
# value (defaults of 32 B / 128 B are too small for the token).
CONFIG_HTTP_SERVER_CAPTURE_HEADER_COUNT=4
CONFIG_HTTP_SERVER_MAX_HEADER_LEN=256
CONFIG_HTTP_SERVER_CAPTURE_HEADER_BUFFER_SIZE=512
CONFIG_HTTP_SERVER_HTTP2_MAX_HEADER_FRAME_LEN=256
CONFIG_JSON_LIBRARY=y
# Needed to parse the fan_curve temperatures (floats) in the settings POST.
CONFIG_JSON_LIBRARY_FP_SUPPORT=y
CONFIG_BASE64=y

CONFIG_HTTP_SERVER_MAX_CLIENTS=4
CONFIG_HTTP_SERVER_CLIENT_BUFFER_SIZE=2048
CONFIG_HTTP_SERVER_STACK_SIZE=10240
CONFIG_NET_HTTP_SERVER_SERVICE_PORT=80
CONFIG_NET_HTTPS_SERVER_SERVICE_PORT=443

# Cryptography and TLS
# Real entropy from the RP2040 ROSC (out-of-tree driver, drivers/entropy) feeding a
# CTR-DRBG CSPRNG, so sys_csrand_get() (password salts, web-session ids) is
# cryptographically secure. Replaces the non-crypto CONFIG_TEST_RANDOM_GENERATOR.
CONFIG_ENTROPY_GENERATOR=y
CONFIG_CTR_DRBG_CSPRNG_GENERATOR=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_CIPHER_CHACHA20_ENABLED=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_MBEDTLS_CIPHER_MODE_CBC_ENABLED=y
CONFIG_MBEDTLS_CHACHAPOLY_AEAD_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
CONFIG_MBEDTLS_PK_WRITE_C=y
CONFIG_MBEDTLS_POLY1305=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_CCM=y
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_ALG_TLS12_PRF=y
CONFIG_PSA_WANT_ALG_SHA_1=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
# The entire TLS handshake cost is P-256 (ECDHE key exchange + ECDSA cert signature)
# on a Cortex-M0+ with no crypto hardware. p256-m is a tiny secp256r1 implementation
# hand-optimised for M0/M0+, routed transparently through PSA - it slashes the
# generic mbedTLS ECP handshake time.
CONFIG_MBEDTLS_PSA_P256M_DRIVER_ENABLED=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_TLS_CREDENTIALS_LOG_LEVEL_WRN=y

CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=4
CONFIG_TLS_MAX_CREDENTIALS_NUMBER=3
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=2048
# Measured peak ~18.3KB under 4 concurrent TLS handshakes (= HTTP_SERVER_MAX_CLIENTS);
# 30KB leaves ~1.6x headroom for the buffer allocator's fragmentation. Was 45000.
CONFIG_MBEDTLS_HEAP_SIZE=30000
