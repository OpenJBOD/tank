# Config overlay for the MCUboot image (applied on top of the board's mcuboot
# defconfig). MCUboot writes sub-page swap trailers during a swap, so it must use
# the OpenJBOD out-of-tree flash driver too (the in-tree one drops sub-page
# writes on the W25Q128). The driver module is provided by the Tank repo
# (tank/zephyr/module.yml) and is visible to every workspace image.
CONFIG_FLASH_RPI_PICO=n
CONFIG_FLASH_RPI_PICO_FIXED=y
