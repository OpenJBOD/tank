# Development/debug overlay. Apply with:
#   west build -s tank -b rpi_pico -- -DEXTRA_CONF_FILE=debug.conf
# or `scripts/build.sh --debug` / `make build-debug`.
# Layered on top of prj.conf; never used by release builds.

# Catch programming errors loudly instead of silently misbehaving.
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y

# Verbose, dev-friendly logging.
# NB: do NOT enable CONFIG_LOG_MODE_IMMEDIATE here. Immediate mode formats log
# messages on the calling thread's stack; the w5500 driver thread is too small
# for that and hard-faults at "Link up". Deferred logging (the default) is safe.
CONFIG_BOOT_BANNER=y
CONFIG_PRINTK=y

# Raise the noisy-but-useful network subsystems to DEBUG.
CONFIG_NET_HTTP_LOG_LEVEL_DBG=y
CONFIG_NET_IPV4_LOG_LEVEL_DBG=y
CONFIG_NET_DHCPV4_LOG_LEVEL_DBG=y
CONFIG_NET_IF_LOG_LEVEL_DBG=y

# Thread introspection: `kernel threads`, `kernel stacks`, `thread_analyzer`.
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_PRINTK=y
CONFIG_THREAD_ANALYZER_AUTO=n
